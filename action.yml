name: Notify Slack of Release
description: "Fetch release information by numeric release ID and send a Slack notification with the release details."

inputs:
  release_number:
    description: "ID of the release. For example 1.1.205"
    required: true
  channel_id:
    description: "Slack channel ID (e.g. C01234567)."
    required: true
  github_token:
    description: 'GITHUB_TOKEN or a repo scoped PAT'
    default: ${{ github.token }}
    required: false
  slack_bot_token:
    description: The slack bot token used to post messages
    required: true

runs:
  using: "composite"
  steps:
    - name: Get Release Info
      id: release_info
      uses: actions/github-script@v7
      env:
        RELEASE_NUMBER: ${{ inputs.release_number }}
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          const releaseNumber = process.env.RELEASE_NUMBER;
          console.log(`🔍 Fetching release information for ID: ${releaseNumber}`);

          // Make the GET /releases/{id} call using Octokit (github-script gives us the pre-authenticated client)
          const release = await github.rest.repos.getRelease({
            owner: context.repo.owner,
            repo: context.repo.repo,
            release_id: Number(releaseNumber),
          });

          // Escape double quotes and newlines in the body
          const rawBody = release.data.body ?? "";
          const bodyEscaped = rawBody
            .replace(/"/g, '\\"')
            .replace(/\n/g, '\\n');

          // Set outputs
          core.setOutput("BODY", bodyEscaped);
          core.setOutput("NAME", release.data.name);
          core.setOutput("URL", release.data.url);

    - name: Send Slack Notification
      uses: slackapi/slack-github-action@v2.0.0
      with:
        method: chat.postMessage
        token: ${{ inputs.slack_bot_token }}
        payload: |
          {
            "channel": "${{ inputs.channel_id }}",
            "text": "🚀 New Release",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "mrkdwn",
                  "text": "🚀 ${{ steps.release_info.outputs.NAME }}"}
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "🚀 *<${{ steps.release_info.outputs.URL }}|Github Release Link>*"
                }
              },
              {
                "type": "markdown",
                "text": "${{ steps.release_info.outputs.BODY }}"
              }
            ]
          }
