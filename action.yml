name: Notify Slack of Release
description: 'Fetch release information by numeric release ID and send a Slack notification with the release details.'

inputs:
  release_number:
    description: "Release ID or Tag (e.g. '210470574' or '1.1.205')"
    required: true
  subtitle:
    description: 'The subtitle of the release. It could be an environment variable (eg. stage) or some other detail'
    required: false
  channel_id:
    description: "Slack channel ID (e.g. C01234567) or channel name (e.g. 'release-notes' or '#release-notes'). Names are resolved to an ID before posting."
    required: true
  github_token:
    description: 'GITHUB_TOKEN or a repo scoped PAT'
    default: ${{ github.token }}
    required: false
  slack_bot_token:
    description: 'The slack bot token used to post messages'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Get Release Info
      id: release_info
      uses: actions/github-script@v7
      env:
        RELEASE_NUMBER: ${{ inputs.release_number }}
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          const releaseNumber = process.env.RELEASE_NUMBER;
          console.log(`🔍 Attempting to fetch release by ID or Tag: ${releaseNumber}`);

          let release;

          // If purely numeric, treat it as a release ID
          if (/^\d+$/.test(releaseNumber)) {
            release = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(releaseNumber),
            });
          } else {
            // Otherwise, assume it's a tag
            release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: releaseNumber,
            });
          }

          // Escape double quotes in the body (avoid turning \n into \\n so Slack can parse newlines)
          const rawBody = release.data.body ?? "";
          const bodyEscaped = rawBody.replace(/"/g, '\\"').replace(/\n/g, '\\n');

          core.setOutput("BODY", bodyEscaped);
          core.setOutput("NAME", release.data.name);
          core.setOutput("URL", release.data.url);
          core.setOutput("REPO_NAME", context.repo.repo);

    - name: Resolve Slack Channel
      id: resolve_channel
      shell: bash
      env:
        SLACK_BOT_TOKEN: ${{ inputs.slack_bot_token }}
        CHANNEL_INPUT: ${{ inputs.channel_id }}
      run: |
        set -euo pipefail

        # Strip an optional leading '#' so '#release-notes' and 'release-notes' behave the same.
        channel="${CHANNEL_INPUT#\#}"

        # Slack channel/conversation IDs look like C/G/D followed by uppercase alphanumerics.
        # Anything else is treated as a human-readable channel name and resolved to an ID.
        if [[ "$channel" =~ ^[CGD][A-Z0-9]{6,}$ ]]; then
          echo "Input '$channel' looks like a Slack channel ID; using it directly."
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "Resolving Slack channel name '$channel' to an ID..."
        cursor=""
        resolved=""
        while :; do
          response="$(curl -sS -G 'https://slack.com/api/conversations.list' \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            --data-urlencode 'types=public_channel,private_channel' \
            --data-urlencode 'exclude_archived=true' \
            --data-urlencode 'limit=1000' \
            --data-urlencode "cursor=${cursor}")"

          if [[ "$(echo "$response" | jq -r '.ok')" != "true" ]]; then
            echo "::error::Slack API error while listing channels: $(echo "$response" | jq -r '.error // "unknown"')"
            exit 1
          fi

          resolved="$(echo "$response" | jq -r --arg name "$channel" '.channels[] | select(.name == $name) | .id' | head -n1)"
          if [[ -n "$resolved" ]]; then
            break
          fi

          cursor="$(echo "$response" | jq -r '.response_metadata.next_cursor // ""')"
          if [[ -z "$cursor" ]]; then
            break
          fi
        done

        if [[ -z "$resolved" ]]; then
          echo "::error::Could not find a Slack channel named '$channel'. Make sure the name is correct and the bot can see the channel (channels:read / groups:read scopes)."
          exit 1
        fi

        echo "Resolved channel '$channel' to ID '$resolved'."
        echo "channel=$resolved" >> "$GITHUB_OUTPUT"

    - name: Send Slack Notification
      uses: slackapi/slack-github-action@v2.0.0
      with:
        method: chat.postMessage
        token: ${{ inputs.slack_bot_token }}
        payload: |
          {
            "channel": "${{ steps.resolve_channel.outputs.channel }}",
            "text": "🚀 New Release",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "emoji": true,
                  "text": "🚀 New Release: #️⃣ ${{ steps.release_info.outputs.REPO_NAME }} ${{ steps.release_info.outputs.NAME }}"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "**${{ inputs.subtitle || '' }}**"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "🔗 *<${{ steps.release_info.outputs.URL }}|Github Release Link>*"
                }
              },
              {
                "type": "markdown",
                "text": "${{ steps.release_info.outputs.BODY }}"
              }
            ]
          }
