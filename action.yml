name: Notify Slack of Release
description: 'Fetch release information by numeric release ID and send a Slack notification with the release details.'

inputs:
  release_number:
    description: "Release ID or Tag (e.g. '210470574' or '1.1.205')"
    required: true
  subtitle:
    description: 'The subtitle of the release. It could be an environment variable (eg. stage) or some other detail'
    required: false
  channel_id:
    description: 'Slack channel ID (e.g. C01234567).'
    required: true
  github_token:
    description: 'GITHUB_TOKEN or a repo scoped PAT'
    default: ${{ github.token }}
    required: false
  slack_bot_token:
    description: 'The slack bot token used to post messages'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Get Release Info
      id: release_info
      uses: actions/github-script@v7
      env:
        RELEASE_NUMBER: ${{ inputs.release_number }}
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          const releaseNumber = process.env.RELEASE_NUMBER;
          console.log(`🔍 Attempting to fetch release by ID or Tag: ${releaseNumber}`);

          let release;

          // If purely numeric, treat it as a release ID
          if (/^\d+$/.test(releaseNumber)) {
            release = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(releaseNumber),
            });
          } else {
            // Otherwise, assume it's a tag
            release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: releaseNumber,
            });
          }

          // Escape double quotes in the body (avoid turning \n into \\n so Slack can parse newlines)
          const rawBody = release.data.body ?? "";
          const bodyEscaped = rawBody.replace(/"/g, '\\"').replace(/\n/g, '\\n');

          core.setOutput("BODY", bodyEscaped);
          core.setOutput("NAME", release.data.name);
          core.setOutput("URL", release.data.url);
          core.setOutput("REPO_NAME", context.repo.repo);

    - name: Send Slack Notification
      uses: slackapi/slack-github-action@v2.0.0
      with:
        method: chat.postMessage
        token: ${{ inputs.slack_bot_token }}
        payload: |
          {
            "channel": "${{ inputs.channel_id }}",
            "text": "🚀 New Release",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "emoji": true,
                  "text": "🚀 New Release: #️⃣ ${{ steps.release_info.outputs.REPO_NAME }} ${{ steps.release_info.outputs.NAME }}"
                }
              },
              {
                "type": "markdown",
                "text": "**${{ inputs.subtitle || '' }}**"
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "🔗 *<${{ steps.release_info.outputs.URL }}|Github Release Link>*"
                }
              },
              {
                "type": "markdown",
                "text": "${{ steps.release_info.outputs.BODY }}"
              }
            ]
          }
